# Format definitions for config-guardian reports

[report]
sections = [
  "CONFLICTS",
  "STALE REFERENCES",
  "ENVIRONMENT ISSUES",
  "SKILL OVERLAP",
  "SETTINGS & CONFIG",
  "PROJECT INIT",
  "PERMISSION ALLOWLIST",
  "SECURITY SCAN",
  "DEPENDENCY CHECK",
  "PERFORMANCE METRICS",
  "ENCODING ISSUES"
]

[severity]
levels = ["Critical", "High", "Medium", "Low"]

[tiers]
tier1 = "Full Auto"
tier2 = "Recommend + Confirm"
tier3 = "Report Only"

[cache]
max_age_days = 30
stale_threshold_days = 7
